<!DOCTYPE html>
<html>
<head>
    <title>Debug Console</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .log { margin: 5px 0; padding: 5px; border-left: 3px solid #ccc; }
        .error { border-color: #f00; background: #ffe; }
        .warn { border-color: #fa0; background: #ffa; }
        .info { border-color: #00f; background: #eef; }
        button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Mental Maps Debug Console</h1>
    
    <div>
        <button onclick="testDirectMode()">Test Direct Mode</button>
        <button onclick="checkLocalStorage()">Check LocalStorage</button>
        <button onclick="clearLocalStorage()">Clear LocalStorage</button>
        <button onclick="simulateResponse()">Simulate Response Submission</button>
    </div>
    
    <div id="logs"></div>

    <script>
        // Capture console logs
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        function addLog(message, type = 'info') {
            const logDiv = document.createElement('div');
            logDiv.className = `log ${type}`;
            logDiv.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            document.getElementById('logs').appendChild(logDiv);
            logDiv.scrollIntoView();
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'info');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addLog(args.join(' '), 'warn');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addLog(args.join(' '), 'error');
        };

        function testDirectMode() {
            console.log('🧪 Testing direct mode activation...');
            localStorage.setItem('use_direct_db', 'true');
            console.log('✅ Direct mode enabled in localStorage');
        }

        function checkLocalStorage() {
            console.log('📊 Checking localStorage contents...');
            
            const keys = Object.keys(localStorage);
            console.log(`Found ${keys.length} localStorage keys:`);
            
            keys.forEach(key => {
                if (key.includes('direct_response') || key.includes('demographic') || key.includes('mental_maps')) {
                    const value = localStorage.getItem(key);
                    console.log(`  ${key}: ${value ? value.substring(0, 100) + '...' : 'null'}`);
                }
            });
            
            // Check for response index
            const responseIndex = localStorage.getItem('direct_responses_index');
            if (responseIndex) {
                const parsed = JSON.parse(responseIndex);
                console.log(`📝 Response index contains ${parsed.length} entries`);
            } else {
                console.log('❌ No response index found');
            }
        }

        function clearLocalStorage() {
            console.log('🧹 Clearing localStorage...');
            const keys = Object.keys(localStorage);
            let cleared = 0;
            
            keys.forEach(key => {
                if (key.includes('direct_response') || key.includes('demographic') || key.includes('mental_maps') || key.includes('use_direct_db')) {
                    localStorage.removeItem(key);
                    cleared++;
                }
            });
            
            console.log(`✅ Cleared ${cleared} localStorage entries`);
        }

        function simulateResponse() {
            console.log('🎭 Simulating response submission...');
            
            // Simulate the direct database service
            const storageKey = `direct_response_${Date.now()}_${Math.random().toString(36).substring(2, 15)}`;
            const responseRecord = {
                id: storageKey,
                participantId: 'debug_participant_123',
                questionId: 'debug_question_456',
                responseData: { answer: 'Debug test response' },
                mapDrawing: { elements: [{ type: 'circle', coordinates: [0, 0] }] },
                responseTimeMs: 3000,
                timestamp: new Date().toISOString(),
                synced: false
            };

            localStorage.setItem(storageKey, JSON.stringify(responseRecord));
            
            const indexKey = 'direct_responses_index';
            const existingIndex = JSON.parse(localStorage.getItem(indexKey) || '[]');
            existingIndex.push(storageKey);
            localStorage.setItem(indexKey, JSON.stringify(existingIndex));

            console.log('✅ Simulated response stored:', storageKey);
            console.log('📊 Total responses now:', existingIndex.length);
        }

        // Initial check
        console.log('🚀 Debug console loaded');
        checkLocalStorage();
    </script>
</body>
</html>
