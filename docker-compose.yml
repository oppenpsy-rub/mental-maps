version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: mental-maps-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mental-maps-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mental-maps-redis-prod
    volumes:
      - redis_data:/data
    networks:
      - mental-maps-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mental-maps-backend-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - mental-maps-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mental-maps-frontend-prod
    environment:
      VITE_API_URL: ${API_URL}
    depends_on:
      - backend
    networks:
      - mental-maps-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mental-maps-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - mental-maps-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  mental-maps-network:
    driver: bridge