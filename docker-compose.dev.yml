services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: mental-maps-postgres
    environment:
      POSTGRES_DB: mental_maps_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mental-maps-network

  redis:
    image: redis:7-alpine
    container_name: mental-maps-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mental-maps-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mental-maps-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mental_maps_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - mental-maps-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mental-maps-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - mental-maps-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  mental-maps-network:
    driver: bridge